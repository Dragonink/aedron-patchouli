<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log in Aedron Patchouli</title>
    <meta name="application-name" content="Aedron Patchouli" />
    <meta name="description" content="Friendly media server" />
    <meta name="author" content="Dragonink" />
    <link rel="author" href="https://github.com/Dragonink" />
    <meta name="color-scheme" content="dark" />
</head>

<body>
    <form method="post" action="/login">
        <label>
            Username
            <input name="name" type="text" autocomplete="username" autofocus required />
        </label>
        <label>
            Password
            <input name="passwd" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Login</button>
    </form>
</body>

</html>
