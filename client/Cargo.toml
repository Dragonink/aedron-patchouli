[package]
name = "aedron_patchouli-client"
version = "0.2.0"
description = "Friendly media server --- Client binary"
authors = ["Dragonink (https://github.com/Dragonink)"]
edition = "2021"
publish = false
autobins = false
[lib]
path = "src/main.rs"
crate-type = ["cdylib"]

[dependencies]
aedron_patchouli-common = { path = "../common" }
console_error_panic_hook = "0"
enum-iterator = "1"
js-sys = "0"
rmp-serde = "1"
serde = "1"
serde_json = "1"
sycamore-router = { git = "https://github.com/sycamore-rs/sycamore" }
wasm-bindgen = "0"
wasm-bindgen-futures = "0"
wee_alloc = "0"
[dependencies.sycamore]
git = "https://github.com/sycamore-rs/sycamore"
features = ["suspense"]
[dependencies.web-sys]
version = "0"
features = [
	"console",
	"Document",
	"Element",
	"Event",
	"EventTarget",
	"FormData",
	"Headers",
	"HtmlButtonElement",
	"HtmlDialogElement",
	"HtmlDocument",
	"HtmlFormElement",
	"HtmlInputElement",
	"Location",
	"Node",
	"Request",
	"RequestInit",
	"Response",
	"UrlSearchParams",
	"Window"
]
